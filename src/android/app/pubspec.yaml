name: balkon_borg
description: "Balkon-Borg companion app: mode control, live view, health and events."
publish_to: 'none'

# versionName + versionCode; served as /apk/version.json on the borg-pi.
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management (project decision: Provider, not Riverpod/Bloc).
  provider: ^6.1.2
  # MQTT client for the balkon/* contract (plain MQTT, no TLS).
  mqtt_client: ^10.8.0
  # U21 live view: WebRTC against go2rtc (MJPEG as fallback).
  flutter_webrtc: ^1.2.0
  # Media/APK fetch over plain HTTP.
  http: ^1.2.2
  # Settings persistence (broker host, intervals, notification toggles).
  shared_preferences: ^2.3.3
  # U21 push-to-talk recording (E4). Its `hasPermission()` requests the
  # RECORD_AUDIO runtime permission itself, so no separate permission_handler
  # dependency is needed.
  record: ^7.1.1
  # Watch-window local notifications (E6, src/shared/README.md "Notification
  # model — no push server").
  flutter_local_notifications: ^22.0.1
  # Watch-window background execution while the app is backgrounded: a
  # visible low-priority foreground service ("Borg wacht · bis HH:MM").
  flutter_foreground_task: ^10.0.0
  # Chained fade/scale sequences for the boot animation (E7).
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/Manrope-OFL.txt
    - assets/fonts/SpaceGrotesk-OFL.txt

  # Bundled offline (D3): variable TTFs from the google/fonts OFL repo, each
  # weight entry pointing at the same variable-font file (Flutter's supported
  # way to use a variable font without a runtime download).
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 700
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 800
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 700

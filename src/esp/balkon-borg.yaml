# Balkon-Borg ESP32 front panel (ESPHome).
#
# The panel is a **dumb input device** (decision 2026-07-20, src/log/decisions.md): it
# reports what happened and never decides what it means. Buttons, encoder, radar and
# BME280 are published on `balkon/input/*`, `balkon/presence` and `balkon/env/*`; the
# arbiter on the borg-pi owns mode state, brightness, volume and the light.
#
# It used to drive WLED directly. That contradicted the contract and would have meant
# two owners for one lamp, drifting apart in a way nobody can debug from the outside.
#
# The one local behaviour left: the **button LEDs**, driven from the retained mode
# topics. Those keep working when the Pi is off, which it usually is, so the panel at
# least shows the last known state instead of going dark.
#
# Pin mapping follows the carrier board (pcb/docs/board-spec.md / gen-netlist.py).

substitutions:
  name: balkon-borg

esphome:
  name: ${name}
  friendly_name: Balkon-Borg

esp32:
  board: esp32dev                    # ESP32-DevKitC (WROOM-32)
  framework:
    type: arduino

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name} fallback"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

mqtt:
  broker: !secret mqtt_broker        # the borg-pi5 Mosquitto (the hub)
  username: !secret mqtt_user        # "esp", see shared/borg.yaml
  password: !secret mqtt_password
  # ESPHome's own discovery topics are noise on this broker: the app and the arbiter
  # speak the contract, not Home Assistant's schema.
  discovery: false
  # Presence is a boolean the arbiter needs a shape for, so it is published by hand
  # below rather than through ESPHome's sensor topics.
  topic_prefix: balkon/esp

  # Local feedback: the button LEDs. The only thing the panel decides for itself, and
  # only about its own LEDs. Driven from the retained mode topics, so a panel that
  # boots while the Pi is off still shows the last known state rather than nothing.
  on_json_message:
    - topic: balkon/mode/lumen
      then:
        - lambda: |-
            const char *sub = x["submode"];
            bool on = sub && strcmp(sub, "off") != 0;
            if (on) id(led1).turn_on(); else id(led1).turn_off();

    - topic: balkon/mode/comms
      then:
        - lambda: |-
            const char *sub = x["submode"];
            bool on = sub && strcmp(sub, "off") != 0;
            if (on) id(led2).turn_on(); else id(led2).turn_off();

    - topic: balkon/mode/sentry
      then:
        - lambda: |-
            const char *sub = x["submode"];
            bool armed = sub && strcmp(sub, "off") != 0;
            if (armed) id(led3).turn_on(); else id(led3).turn_off();

    # LED 4 shows what the knob is pointing at: lit for audio, dark for light. One
    # glance answers "why is turning this not changing the brightness".
    - topic: balkon/state/knob
      then:
        - lambda: |-
            const char *target = x["target"];
            bool audio = target && strcmp(target, "audio") == 0;
            if (audio) id(led4).turn_on(); else id(led4).turn_off();

# ---- Buses --------------------------------------------------------------------
i2c:
  sda: GPIO21
  scl: GPIO22

uart:
  id: uart_radar
  tx_pin: GPIO17                      # -> radar RX
  rx_pin: GPIO16                      # <- radar TX
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  uart_id: uart_radar

# ---- Environment (plain numbers, per the contract) ----------------------------
sensor:
  - platform: bme280_i2c
    address: 0x76
    temperature:
      name: "Balkon Temperatur"
      state_topic: balkon/env/temperature
    humidity:
      name: "Balkon Luftfeuchte"
      state_topic: balkon/env/humidity
    pressure:
      name: "Balkon Luftdruck"
      state_topic: balkon/env/pressure
    update_interval: 30s

  # The radar reports centimetres, not a decision. The distance-to-brightness curve
  # (U1) belongs to the arbiter, which is the only thing that knows what else is going
  # on at the time.
  - platform: ld2410
    moving_distance:
      id: moving_distance
      name: "Radar Bewegungsdistanz"
      internal: true
    still_distance:
      id: still_distance
      name: "Radar Ruhedistanz"
      internal: true

  # Encoder: every detent is an event, the arbiter decides what it adjusts.
  - platform: rotary_encoder
    id: enc
    internal: true
    pin_a:
      number: GPIO32
      mode: INPUT_PULLUP          # M8: EC11 contacts to GND; no external pull-ups
    pin_b:
      number: GPIO33
      mode: INPUT_PULLUP
    on_clockwise:
      - mqtt.publish_json:
          topic: balkon/input/encoder
          payload: |-
            root["v"] = 1;
            root["delta"] = 1;
    on_anticlockwise:
      - mqtt.publish_json:
          topic: balkon/input/encoder
          payload: |-
            root["v"] = 1;
            root["delta"] = -1;

# ---- Button LEDs (via NPN, GPIO high = on) ------------------------------------
output:
  - platform: gpio
    pin: GPIO4
    id: led1
  - platform: gpio
    pin: GPIO23
    id: led2
  - platform: gpio
    pin: GPIO18
    id: led3
  - platform: gpio
    pin: GPIO19
    id: led4

# ---- Inputs -------------------------------------------------------------------
binary_sensor:
  # Presence: published as the contract's shape, with the distance the arbiter needs
  # for the U1 ramp.
  - platform: ld2410
    has_target:
      id: presence
      name: "Präsenz"
      internal: true
      filters:
        - delayed_off: 120s          # keep "present" 2 min after the last detection
      on_press:
        - mqtt.publish_json:
            topic: balkon/presence
            payload: |-
              root["v"] = 1;
              root["present"] = true;
              root["distance_cm"] = (int) id(moving_distance).state;
      on_release:
        - mqtt.publish_json:
            topic: balkon/presence
            payload: |-
              root["v"] = 1;
              root["present"] = false;
              root["distance_cm"] = 0;

  # Buttons 1-4. Short and long press are distinguished here because the timing is a
  # property of the switch, not of the mode logic; what each one *means* is in
  # arbiter/inputs.go.
  - platform: gpio
    name: "Taster 1"
    id: button1
    internal: true
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      - min_length: 30ms
        max_length: 600ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 1;
                root["action"] = "short";
      - min_length: 700ms
        max_length: 4000ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 1;
                root["action"] = "long";

  - platform: gpio
    name: "Taster 2"
    id: button2
    internal: true
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      - min_length: 30ms
        max_length: 600ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 2;
                root["action"] = "short";
      - min_length: 700ms
        max_length: 4000ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 2;
                root["action"] = "long";

  - platform: gpio
    name: "Taster 3"
    id: button3
    internal: true
    pin:
      number: GPIO27
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      - min_length: 30ms
        max_length: 600ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 3;
                root["action"] = "short";
      - min_length: 700ms
        max_length: 4000ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 3;
                root["action"] = "long";

  - platform: gpio
    name: "Taster 4"
    id: button4
    internal: true
    pin:
      number: GPIO26
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      - min_length: 30ms
        max_length: 600ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 4;
                root["action"] = "short";
      - min_length: 700ms
        max_length: 4000ms
        then:
          - mqtt.publish_json:
              topic: balkon/input/button
              payload: |-
                root["v"] = 1;
                root["id"] = 4;
                root["action"] = "long";

  # Encoder push: toggles what the knob adjusts (light or volume). The arbiter owns
  # that state and publishes it back on balkon/state/knob.
  - platform: gpio
    name: "Encoder Druck"
    id: encoder_push
    internal: true
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - mqtt.publish_json:
          topic: balkon/input/encoder
          payload: |-
            root["v"] = 1;
            root["action"] = "push";

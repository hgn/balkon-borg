# Balkon-Borg runtime configuration, shared by the Pi and read by provisioning.
#
# The borg-pi5 is the master of this system: values about the world and the device
# live here, not in the clients (see README.md, "the Pi owns the facts"). Clients may
# hold a fallback for the moment before the Pi answers, never an authority.
#
# Validated at borgd startup, so a typo fails immediately with the
# field named instead of turning into odd behaviour later.

broker:
  host: borg-pi
  port: 1883
  # One pre-shared password for every client, checked in deliberately: this is a
  # private repo for a device behind the router, and per-client secrets would only mean
  # three things to lose after an SD failure instead of one. No TLS anywhere in this
  # system either (settled; see the decision log).
  #
  # The user names stay separate so the broker ACL can still enforce who may write
  # what (borgd owns state, app sends commands, esp sends input). They all
  # authenticate with this one password.
  #
  # To change it: edit here, run `./provision.py --only mosquitto-passwd`, then enter
  # the new value in the Android app and the ESP config.
  password: uklgehV0nGdErJ9XyYqpkx7XlWfh

http:
  # The status page and media endpoints. Port 80 works from a user unit thanks to the
  # ip_unprivileged_port_start sysctl the provisioning sets.
  port: 80

paths:
  root: /srv/borg
  media: /srv/borg/media          # tmpfs, volatile on purpose (U14 FIFO)
  clips: /srv/borg/clips          # local for now, NFS to the nas-Pi later (U7)
  timelapse: /srv/borg/media/timelapse
  apk: /srv/borg/apk

location:
  # The balcony, used for ADS-B distance/bearing (U5) and sun/sky times. The app has
  # the same numbers as a fallback today and must take these once they arrive.
  latitude: 48.1372
  longitude: 11.5000
  altitude_m: 520

adsb:
  # Aircraft further out than this are not published; the app's radar draws this range.
  max_range_km: 50
  # An overflight below this altitude and within this distance triggers the aircraft
  # event (U5). The cooldown keeps one circling helicopter from filling the event ring.
  low_pass_ft: 5000
  low_pass_km: 8
  low_pass_cooldown_s: 600
  # Where readsb writes its aircraft.json (tmpfs: rewritten every second).
  aircraft_json: /run/borg/readsb/aircraft.json

ism:
  # rtl_433, hopping between the two European ISM bands (U13): TPMS and many cheap
  # 433 MHz sensors sit here, but most weather stations and smart-home gear transmit
  # at 868 MHz, so a fixed capture would miss one of the two worlds.
  hop_interval_s: 60
  # Below this a tyre reads as low (U13's tyre-pressure event). Passenger car cold
  # pressure is typically 220-250 kPa; TPMS dashboard warnings usually trip around 25%
  # under that, so this flags a genuinely low tyre, not a cold-morning wobble.
  tpms_low_kpa: 180
  # Once a sensor id has raised a low-tyre event, wait this long before it may raise
  # another: the same car's sensor keeps transmitting for as long as it stays parked
  # nearby, and without this the event ring would fill with one flat tyre.
  tpms_cooldown_s: 14400

environment:
  # Sample cadence for the retained env history the app charts (U4).
  sample_interval_s: 60
  history_hours: 24
  # Above this relative humidity the app tints the background (E11); hysteresis keeps
  # a sensor sitting on the threshold from flickering the effect.
  condensation_on_pct: 85.0
  condensation_off_pct: 82.0

storm:
  # Meteorological rule of thumb: a sustained pressure drop around this rate over the
  # window below is the classic sign of an approaching low front (U9.3).
  drop_hpa_per_hour: 1.0
  window_hours: 3
  # Once triggered, wait this long before warning again for the same weather system.
  cooldown_s: 21600
  # A gap between consecutive samples wider than this means the unit was off, not
  # that the weather changed; the detector refuses to read a gap as a drop.
  max_gap_s: 900

sentry:
  # U11 escalation ladder. Once armed, the ladder goes live only once the radar has
  # reported a clear scene, or after this fallback, whichever comes first — long
  # enough to water the plants and walk out.
  exit_delay_s: 60
  # How long a radar presence sighting waits for Frigate to confirm a person before
  # falling back to plain watching. Generous relative to Frigate's ~2 FPS radar-gated
  # idle rate (U7), so the camera has time to wake up and run a few frames.
  person_window_s: 15
  # Once a person is confirmed, how long disarming still stops the effector, the
  # recording and the push before they fire (U11 "Entry handling").
  entry_grace_s: 30
  # After the effector fires, the ladder returns to armed once the scene has cleared
  # once, or after this fallback: a lingering person must not re-trigger it on a loop.
  alarm_cooldown_s: 60
  # While armed, the light gives a short dim red breath this often. An armed system
  # nobody remembers arming is one that gets switched off in anger the first time it
  # goes off at the wrong moment.
  pulse_every_s: 120

audio:
  # Piper and its voice model, installed by provisioning. A missing model means the
  # unit is quiet, not broken: announcements go silent, everything else keeps running.
  piper: /srv/borg/piper/piper
  voice: /srv/borg/piper/voice.onnx
  # How far to extend the whip per band, announced on a band change. The antenna is a
  # manual, one-size compromise (docs/build-notes.md): the mode switch retunes the
  # tuner, not the hardware, so the unit can only ask nicely.
  antenna_cm:
    fm: 75
    dab: 40
    airband: 60
    shortwave: 200
    adsb: 7
    ism: 17

health:
  # How often each capability is re-probed. Plugging the SDR in later must bring it
  # back without a restart.
  probe_interval_s: 30

capabilities:
  # Switch a capability off here and it reports `disabled` instead of `missing`: the
  # difference between "not wanted" and "wanted but broken".
  sdr: true
  camera: true
  microphone: true
  speaker: true
  esp: true

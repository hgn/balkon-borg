# Plain MQTT on the LAN. No TLS anywhere in this system, deliberately: longevity and
# repairability beat transport security for a device behind the router, and certificates
# that expire in three years would brick it in a way nobody remembers how to fix.

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Retained messages are how a periodically-waking phone gets the full picture on
# subscribe, so they have to survive a restart of the broker itself.
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# systemd captures stdout; a second log inside the container would only rot.
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true

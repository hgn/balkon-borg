# The Pi has no RTC and boots cold, so its clock starts wrong. Timestamps here are
# load-bearing (bird log, events, time-lapse), so sync hard and keep retrying: a pool
# rather than one server, and a short retry interval while unsynced. Persistence gates
# on the sync state (see the arbiter's clock capability), so a slow sync costs a gap in
# the data, never a wrong timestamp.

[Time]
NTP=0.de.pool.ntp.org 1.de.pool.ntp.org 2.de.pool.ntp.org 3.de.pool.ntp.org
FallbackNTP=time.cloudflare.com time.google.com
PollIntervalMinSec=16
PollIntervalMaxSec=2048
ConnectionRetrySec=15
